<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معهد علوم المستقبل - سرعة فائقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: right; font-size: 0.9rem; }
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
        .status-pending { background: #fffbeb; color: #b45309; }
        .status-resolved { background: #ecfdf5; color: #047857; }
        #sync-indicator { display: none; position: fixed; bottom: 20px; left: 20px; background: #1e293b; color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.8rem; z-index: 1000; }
    </style>
</head>
<body>

<div id="sync-indicator">جاري الحفظ في السحابة... ☁️</div>

<div class="container">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--primary); margin:0;">معهد علوم المستقبل العالي للتدريب</h1>
        <small>نظام المزامنة الفوري الذكي</small>
    </header>

    <div class="grid">
        <div class="card">
            <h2>إدارة الطلب</h2>
            <form id="mainForm">
                <input type="text" id="name" placeholder="اسم المتدرب" required>
                <select id="type">
                    <option value="تسجيل دورة">تسجيل دورة</option>
                    <option value="تأجيل">تأجيل</option>
                    <option value="شهادة">شهادة</option>
                    <option value="التحقق المالي">التحقق المالي</option>
                </select>
                <select id="status">
                    <option value="قيد الانتظار">قيد الانتظار</option>
                    <option value="تم الحل">تم الحل</option>
                </select>
                <textarea id="subject" rows="3" placeholder="الملاحظات" required></textarea>
                <button type="submit" class="btn-save" id="submitBtn">حفظ فوري</button>
            </form>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>المتدرب</th>
                        <th>الموضوع</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhDy-4OLbwRWPBR7LpwoGZ8ThnDYdYjWNNFD6jomqQ8K2HDIfcruTe-oZ1I2_-i-aT/exec";
    let localData = []; 
    let currentId = null;

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            localData = await response.json();
            renderTable();
        } catch (e) { console.error("Error loading"); }
    }

    function renderTable() {
        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '';

        // --- التعديل المطلوب يتم هنا ---
        // تم إضافة شرط الترتيب حسب ID (رقم 0) لكي يظهر الأحدث في الأعلى
        const sortedData = [...localData].sort((a, b) => {
            const statusA = a[3]; // عمود الحالة
            const statusB = b[3];
            
            // 1. ترتيب حسب الحالة (قيد الانتظار أولاً)
            if (statusA === "تم الحل" && statusB !== "تم الحل") return 1;
            if (statusA !== "تم الحل" && statusB === "تم الحل") return -1;

            // 2. ترتيب حسب الأحدث (ID يتكون من Timestamp، الرقم الأكبر هو الأحدث)
            // نستخدم Number(b[0]) - Number(a[0]) لجعل الترتيب تنازلي (الأحدث بالأعلى)
            return Number(b[0]) - Number(a[0]);
        });

        sortedData.forEach(row => {
            // row[5] هو عمود التاريخ (إذا كان موجوداً)
            const dateDisplay = row[5] ? row[5] : '---';
            const isResolved = row[3] === 'تم الحل';
            
            tbody.innerHTML += `
                <tr id="row-${row[0]}">
                    <td><b>${row[1]}</b><br><small>${row[2]}</small></td>
                    <td>${row[4]}</td>
                    <td>${dateDisplay}</td>
                    <td><span class="status-badge ${isResolved?'status-resolved':'status-pending'}" 
                        onclick="fastToggle('${row[0]}')">${row[3]}</span></td>
                    <td><button onclick="editLocal('${row[0]}')" style="color:blue; background:none; border:none; cursor:pointer;">تعديل</button></td>
                </tr>`;
        });
    }

    async function sync(payload) {
        document.getElementById('sync-indicator').style.display = 'block';
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        document.getElementById('sync-indicator').style.display = 'none';
    }

    document.getElementById('mainForm').onsubmit = function(e) {
        e.preventDefault();
        
        let recordDate;
        // إذا كنا في وضع التعديل، نحتفظ بالتاريخ القديم، وإلا نضع تاريخ اليوم
        if (currentId) {
            const existingRow = localData.find(r => r[0].toString() === currentId.toString());
            recordDate = existingRow && existingRow[5] ? existingRow[5] : new Date().toLocaleDateString('ar-SA');
        } else {
            recordDate = new Date().toLocaleDateString('ar-SA');
        }

        const payload = {
            id: currentId || Date.now().toString(),
            name: document.getElementById('name').value,
            type: document.getElementById('type').value,
            status: document.getElementById('status').value,
            subject: document.getElementById('subject').value,
            date: recordDate
        };

        // تحديث الواجهة فوراً
        if (currentId) {
            localData = localData.map(r => r[0].toString() === currentId.toString() ? [payload.id, payload.name, payload.type, payload.status, payload.subject, payload.date] : r);
        } else {
            localData.push([payload.id, payload.name, payload.type, payload.status, payload.subject, payload.date]);
        }
        
        renderTable();
        sync(payload);
        this.reset();
        currentId = null;
    };

    function fastToggle(id) {
        localData = localData.map(r => {
            if (r[0].toString() === id.toString()) {
                const newStatus = r[3] === "تم الحل" ? "قيد الانتظار" : "تم الحل";
                // نمرر التاريخ القديم (r[5]) حتى لا يتغير عند تغيير الحالة فقط
                const updatedRow = [r[0], r[1], r[2], newStatus, r[4], r[5]];
                sync({id: r[0], name: r[1], type: r[2], status: newStatus, subject: r[4], date: r[5]});
                return updatedRow;
            }
            return r;
        });
        renderTable();
    }

    function editLocal(id) {
        const r = localData.find(row => row[0].toString() === id.toString());
        if(r) {
            currentId = r[0];
            document.getElementById('name').value = r[1];
            document.getElementById('type').value = r[2];
            document.getElementById('status').value = r[3];
            document.getElementById('subject').value = r[4];
            window.scrollTo(0,0);
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
