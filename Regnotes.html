<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معهد علوم المستقبل العالي للتدريب - إدارة سحابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --primary: #1e3a8a;
            --accent: #3b82f6; 
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .brand-header { text-align: center; margin-bottom: 40px; padding: 20px; }
        .brand-header h1 {
            font-size: 2.4rem; font-weight: 800; color: var(--primary); margin: 0;
            border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 10px;
        }

        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 16px; 
            border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        h2 { font-size: 1.2rem; margin-top: 0; margin-bottom: 25px; color: var(--primary); font-weight: 700; border-right: 5px solid var(--accent); padding-right: 15px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; transition: 0.3s; background: #fff; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .btn-save { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; width: 100%; padding: 15px;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(30, 58, 138, 0.2);
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(30, 58, 138, 0.3); }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: right; color: var(--text-dim); border-bottom: 2px solid var(--border); font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f1f5f9; }

        .status-badge { padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; display: inline-block; transition: 0.3s; }
        .status-pending { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
        .status-resolved { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
        .status-badge:hover { opacity: 0.8; transform: scale(1.05); }

        .btn-edit { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 700; font-size: 0.9rem; }
        .btn-edit:hover { text-decoration: underline; }

        #loader { display: none; text-align: center; color: var(--accent); font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 20px; background: #eff6ff; border: 1px solid #dbeafe; }

        @media (max-width: 950px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="brand-header">
        <h1>معهد علوم المستقبل العالي للتدريب</h1>
        <p style="color: var(--text-dim); font-weight: 500;">النظام السحابي لإدارة السجلات والمتابعة</p>
    </header>

    <div id="loader">جاري مزامنة البيانات مع السحابة... ⏳</div>

    <div class="grid">
        <div class="card">
            <h2 id="formTitle">إدارة الطلب</h2>
            <form id="mainForm">
                <input type="hidden" id="requestId">
                <div class="form-group">
                    <label>اسم المتدرب</label>
                    <input type="text" id="name" placeholder="الاسم الرباعي" required>
                </div>
                <div class="form-group">
                    <label>نوع الإجراء</label>
                    <select id="type">
                        <option value="تسجيل دورة">تسجيل دورة جديدة</option>
                        <option value="تأجيل موعد">تأجيل موعد</option>
                        <option value="طلب شهادة">طلب شهادة</option>
                        <option value="استفسار">استفسار عام</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>حالة التنفيذ</label>
                    <select id="status">
                        <option value="قيد الانتظار">⏳ قيد الانتظار</option>
                        <option value="تم الحل">✅ تم الحل</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الملاحظات والتفاصيل</label>
                    <textarea id="subject" rows="4" placeholder="اكتب تفاصيل الطلب هنا..." required></textarea>
                </div>
                <button type="submit" class="btn-save" id="submitBtn">حفظ البيانات في السحابة</button>
            </form>
        </div>

        <div class="card" style="overflow-x: auto;">
            <h2>السجلات الحالية</h2>
            <table>
                <thead>
                    <tr>
                        <th>المتدرب / النوع</th>
                        <th>الموضوع</th>
                        <th>الحالة (اضغط للتبديل)</th>
                        <th>التحكم</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7PRpy0MwU1xb-B84XrpbLg1TyycFPd9L_-ZGDNdjN33s8891sHiVaQ8sl4StSW6Npgg/exec";
    let currentId = null;

    // 1. جلب البيانات من Google Sheets
    async function loadData() {
        document.getElementById('loader').style.display = "block";
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            const tableBody = document.getElementById('dataTable');
            tableBody.innerHTML = '';

            data.reverse().forEach(row => {
                const isResolved = row[3] === 'تم الحل' || row[3].includes('✅');
                const badgeClass = isResolved ? 'status-resolved' : 'status-pending';
                const statusText = isResolved ? 'تم الحل' : 'قيد الانتظار';

                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight:700; color:var(--primary)">${row[1]}</div>
                            <small style="color:var(--text-dim)">${row[2]}</small>
                        </td>
                        <td style="max-width:250px">${row[4]}</td>
                        <td>
                            <span class="status-badge ${badgeClass}" 
                                  onclick="quickToggleStatus('${row[0]}','${row[1]}','${row[2]}','${statusText}','${row[4]}')">
                                  ${statusText}
                            </span>
                        </td>
                        <td>
                            <button class="btn-edit" onclick="editForm('${row[0]}','${row[1]}','${row[2]}','${statusText}','${row[4]}')">تعديل</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("خطأ في الاتصال:", error);
        }
        document.getElementById('loader').style.display = "none";
    }

    // 2. إرسال البيانات (إضافة أو تحديث)
    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            id: currentId || Date.now(), // استخدام الـ ID الموجود للتعديل أو إنشاء جديد للإضافة
            name: document.getElementById('name').value,
            type: document.getElementById('type').value,
            status: document.getElementById('status').value,
            subject: document.getElementById('subject').value
        };

        await syncWithCloud(payload);
        e.target.reset();
        currentId = null;
        document.getElementById('submitBtn').innerText = "حفظ البيانات في السحابة";
    };

    // 3. تبديل الحالة مباشرة من الجدول (تحديث نفس السطر)
    async function quickToggleStatus(id, name, type, currentStatus, subject) {
        const newStatus = currentStatus === "تم الحل" ? "قيد الانتظار" : "تم الحل";
        await syncWithCloud({ id, name, type, status: newStatus, subject });
    }

    // 4. تعبئة النموذج للتعديل
    function editForm(id, name, type, status, subject) {
        currentId = id;
        document.getElementById('name').value = name;
        document.getElementById('type').value = type;
        document.getElementById('status').value = status.includes('تم الحل') ? 'تم الحل' : 'قيد الانتظار';
        document.getElementById('subject').value = subject;
        document.getElementById('submitBtn').innerText = "تحديث السجل الحالي";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 5. وظيفة المزامنة المركزية
    async function syncWithCloud(data) {
        document.getElementById('loader').style.display = "block";
        await fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(data) 
        });
        // انتظار بسيط للتأكد من تحديث صفحة جوجل ثم إعادة التحميل
        setTimeout(loadData, 1200);
    }

    window.onload = loadData;
</script>
</body>
</html>
